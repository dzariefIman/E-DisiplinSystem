<html>
    <head>
        <title>HEP Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="eDisiplinStyle.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
        <script src="data.js"></script>
    </head>
    <body>
        <div class="navbar">
            <span class="navbar-brand">HEP welcome to E-Disiplin</span>
        </div>

        <div class="container-main">
            <div class="sidebar">
                <ul>
                    <li><a href="hepDashboard.html" class="active">Home</a></li>
                    <li><a href="addDiscipline.html">Log Discipline</a></li>
                    <li><a href="recordEDisiplin.html">Records</a></li>
                    <li><a href="index.html">Logout</a></li>
                </ul>
            </div>

            <div class="content">
                <div class="dashboard-header">
                    <h2>Dashboard</h2>
                </div>

                <div class="stat-cards-container">
                    <div class="stat-card">
                        <h4>View total disciplinary cases</h4>
                        <p id="totalCasesDisplay"></p>
                    </div>

                    <div class="stat-card">
                        <h4>View most common offenses</h4>
                        <p id="commonOffenseDisplay"></p>
                    </div>

                    <div class="stat-card">
                        <h4>View pending counseling sessions</h4>
                        <p id="pendingCounselingDisplay"></p>
                    </div>

                    <div class="stat-card">
                        <h4>View charts and reports</h4>
                        <p>System tracking active records</p>
                    </div>
                </div>

                <div class="charts-container">
                    <div class="chart-card">
                        <h3>Cases by Offense Type</h3>
                        <canvas id="offenseChart"></canvas>
                    </div>

                    <div class="chart-card">
                        <h3>Counseling Session Success Rate</h3>
                        <canvas id="successRateChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <script>
        const disciplinaryRecords = incidents;

        const totalCases = disciplinaryRecords.length;
        document.getElementById("totalCasesDisplay").innerText = totalCases;

        const offenseCount = {};
        disciplinaryRecords.forEach(record => {
            offenseCount[record.offense] = (offenseCount[record.offense] || 0) + 1;
        });

        let maxOffense = "";
        let maxCount = 0;
        for (let offense in offenseCount) {
            if (offenseCount[offense] > maxCount) {
                maxCount = offenseCount[offense];
                maxOffense = offense;
            }
        }
        document.getElementById("commonOffenseDisplay").innerText = maxOffense + " (" + maxCount + ")";

        const pendingCount = disciplinaryRecords.filter(r => r.status === "Pending").length;
        document.getElementById("pendingCounselingDisplay").innerText = pendingCount + " cases";

        const ctx1 = document.getElementById('offenseChart').getContext('2d');
        const pieChart = new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: Object.keys(offenseCount),
                datasets: [{
                    data: Object.values(offenseCount),
                    backgroundColor: [
                        '#3498db',
                        '#2ecc71',
                        '#f39c12'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'right'
                    }
                }
            }
        });

        const ctx2 = document.getElementById('successRateChart').getContext('2d');
        const successRateChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Success Rate (%)',
                    data: [0, 0, 100, 100, 50, 50],
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: 5,
                    pointBackgroundColor: '#2ecc71'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            callback: function(value) {
                                return value + '%';
                            }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
        </script>
    </body>
</html>
