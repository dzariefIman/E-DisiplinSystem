<html>
    <head>
        <title>E-Disiplin record</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="eDisiplinStyle.css?v=1.1">
        <script src="data.js"></script>
    </head>
    <body>
        <div class="navbar">
            <span class="navbar-brand">HEP welcome to E-Disiplin</span>
        </div>
        
        <div class="container-main">
            <div class="sidebar">
                <ul>
                    <li><a href="hepDashboard.html">Home</a></li>
                    <li><a href="addDiscipline.html">Log Discipline</a></li>
                    <li><a href="recordEDisiplin.html" class="active">Records</a></li>
                    <li><a href="index.html">Logout</a></li>
                </ul>
            </div>

            <div class="content">
                <div class="dashboard-header">
                    <h2>Disciplinary Records</h2>
                </div>

                <div class="notification" id="recordNotification"></div>

                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="Search by name or ID..." oninput="filterRecords()" class="filter-input">
                    <select id="filterOffense" onchange="filterRecords()" class="filter-select">
                        <option value="">All Offenses</option>
                        <option value="Smoking">Smoking</option>
                        <option value="Cheating">Cheating</option>
                        <option value="Bullying">Bullying</option>
                        <option value="Fighting">Fighting</option>
                        <option value="Vandalism">Vandalism</option>
                        <option value="Late Attendance">Late Attendance</option>
                        <option value="Disrespect">Disrespect to Staff</option>
                        <option value="Skipping">Skipping Classes</option>
                    </select>
                    <select id="filterStatus" onchange="filterRecords()" class="filter-select">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Not Set">Not Set</option>
                    </select>
                    <select id="filterCounselor" onchange="filterRecords()" class="filter-select">
                        <option value="">All Counselors</option>
                        <option value="Pn. Farah">Pn. Farah</option>
                        <option value="En. Amir">En. Amir</option>
                        <option value="Pn. Aina">Pn. Aina</option>
                        <option value="En. Hafiz">En. Hafiz</option>
                    </select>
                </div>

                <div class="table-container">
                    <table class="records-table" id="incidentTable">
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Student Name</th>
                                <th>Offense Type</th>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Assigned Counselor</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="editModalOverlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h3>Edit Disciplinary Record</h3>
                    <button type="button" class="close-modal" onclick="closeEditModal()">&times;</button>
                </div>
                <form id="editIncidentForm">
                    <div class="modal-form-grid">
                        <div class="modal-field"><label>Student ID</label><input type="text" name="studentID"></div>
                        <div class="modal-field"><label>Student Name</label><input type="text" name="studentName"></div>
                        <div class="modal-field"><label>Offense Type</label>
                            <select name="offenseType">
                                <option>Smoking</option>
                                <option>Bullying</option>
                                <option>Fighting</option>
                                <option>Cheating in Exam</option>
                                <option>Vandalism</option>
                                <option>Late Attendance</option>
                                <option>Dress Code Violation</option>
                                <option>Plagiarism</option>
                                <option>Hostel Misconduct</option>
                            </select>
                        </div>
                        <div class="modal-field"><label>Date of Incident</label><input type="date" name="disciplineDate"></div>
                        <div class="modal-field full"><label>Description</label><textarea name="disciplineDesc" rows="4"></textarea></div>
                        <div class="modal-field"><label>Assigned Counselor</label>
                            <select name="assignedCounselor">
                                <option value="">-- Select counselor --</option>
                                <option>Pn. Farah</option>
                                <option>En. Amir</option>
                                <option>Pn. Aina</option>
                                <option>En. Hafiz</option>
                            </select>
                        </div>
                        <div class="modal-field"><label>Status</label>
                            <select name="caseStatus"><option>Pending</option><option>Completed</option></select>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="action-button modal-cancel" onclick="closeEditModal()">Cancel</button>
                        <button type="submit" class="action-button modal-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <script>
        (function () {
            const tbody = document.querySelector('#incidentTable tbody');
            const recordNotification = document.getElementById('recordNotification');
            const modalOverlay = document.getElementById('editModalOverlay');
            const editForm = document.getElementById('editIncidentForm');
            const counselorPool = ['Pn. Farah','En. Amir','Pn. Aina','En. Hafiz'];
            let activeIndex = null;
            let notifTimer = null;
            let filteredData = null;

            function showNotification(msg) {
                recordNotification.textContent = msg;
                recordNotification.classList.add('show');
                clearTimeout(notifTimer);
                notifTimer = setTimeout(() => recordNotification.classList.remove('show'), 2200);
            }

            function pickCounselor(item, idx) {
                return item.assignedCounselor || counselorPool[idx % counselorPool.length];
            }

            function getData() {
                return filteredData || incidents;
            }

            function renderRows() {
                const data = getData();
                tbody.innerHTML = '';
                data.forEach((item, idx) => {
                    const realIdx = incidents.indexOf(item);
                    let statusClass = 'status-pending';
                    if (item.status === 'Completed') statusClass = 'status-completed';
                    else if (item.status === 'Not Set') statusClass = 'status-notset';
                    const tr = document.createElement('tr');
                    tr.dataset.index = realIdx;
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.offense}</td>
                        <td>${item.date}</td>
                        <td>${item.desc}</td>
                        <td>${pickCounselor(item, realIdx)}</td>
                        <td><span class="status-badge ${statusClass}">${item.status}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button type="button" class="action-button edit-button" data-action="edit">Edit</button>
                                <button type="button" class="action-button delete-button" data-action="delete">Delete</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            window.filterRecords = function () {
                const search = document.getElementById('searchInput').value.toLowerCase().trim();
                const offense = document.getElementById('filterOffense').value;
                const status = document.getElementById('filterStatus').value;
                const counselor = document.getElementById('filterCounselor').value;

                filteredData = incidents.filter(item => {
                    const matchSearch = !search || item.name.toLowerCase().includes(search) || item.id.toLowerCase().includes(search);
                    const matchOffense = !offense || item.offense === offense;
                    const matchStatus = !status || item.status === status;
                    const matchCounselor = !counselor || item.assignedCounselor === counselor;
                    return matchSearch && matchOffense && matchStatus && matchCounselor;
                });

                renderRows();
            }

            function openEdit(index) {
                activeIndex = index;
                const item = incidents[index];
                editForm.studentID.value = item.id;
                editForm.studentName.value = item.name;
                editForm.offenseType.value = item.offense;
                editForm.disciplineDate.value = item.date;
                editForm.disciplineDesc.value = item.desc;
                editForm.assignedCounselor.value = item.assignedCounselor || '';
                editForm.caseStatus.value = item.status;
                modalOverlay.classList.add('show');
            }

            function closeEdit() { modalOverlay.classList.remove('show'); activeIndex = null; }

            function hideRow(button) { const row = button.closest('tr'); row.style.display = 'none'; showNotification('Record successfully deleted.'); }

            tbody.addEventListener('click', function (e) {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                const row = btn.closest('tr');
                const idx = Number(row.dataset.index);
                if (btn.dataset.action === 'edit') openEdit(idx);
                if (btn.dataset.action === 'delete') hideRow(btn);
            });

            editForm.addEventListener('submit', function (e) {
                e.preventDefault();
                if (activeIndex === null) { closeEdit(); return; }
                const row = document.querySelector(`tr[data-index="${activeIndex}"]`);
                incidents[activeIndex].id = editForm.studentID.value;
                incidents[activeIndex].name = editForm.studentName.value;
                incidents[activeIndex].offense = editForm.offenseType.value;
                incidents[activeIndex].date = editForm.disciplineDate.value;
                incidents[activeIndex].desc = editForm.disciplineDesc.value;
                incidents[activeIndex].assignedCounselor = editForm.assignedCounselor.value;
                incidents[activeIndex].status = editForm.caseStatus.value;
                renderRows();
                showNotification('Record successfully edited.');
                closeEdit();
            });

            modalOverlay.addEventListener('click', function (e) { if (e.target === modalOverlay) closeEdit(); });

            window.closeEditModal = closeEdit;

            renderRows();
        })();
        </script>
    </body>
</html>
